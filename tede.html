<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ΤΕΔΕ // σκονάκι</title>
<style>
  :root{
    --bg:#faf8f4;
    --bg2:#f3f0ea;
    --card:#ffffff;
    --line:#e8e3d8;
    --text:#3a362e;
    --dim:#928c7e;
    --mono:#6b6253;
    --accent-class:#5b8fb0;   /* Classification — dusty blue */
    --accent-clust:#7a9d7e;   /* Clustering — sage green */
    --accent-assoc:#c99a4a;   /* Association — soft ochre */
    --accent-ens:#b07a9e;     /* Ensembles — muted mauve */
    --code-bg:#f3f0ea;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background: var(--accent-class); color:#fff; }

  .mono{ font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace; }

  /* ---------- HEADER / SEARCH (sticky) ---------- */
  header{
    position: sticky; top:0; z-index: 20;
    background: linear-gradient(180deg, var(--bg) 75%, rgba(250,248,244,0.9));
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
    padding: 16px 18px 14px;
  }
  .titlebar{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:12px;
  }
  .titlebar .tag{
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px; color: var(--dim); letter-spacing: 0.08em;
  }
  h1{
    font-size: 23px; margin:0; font-weight: 700; letter-spacing: -0.01em;
  }
  h1 small{ display:block; font-size:13px; font-weight:500; color:var(--dim); margin-top:3px; letter-spacing:0.02em;}

  .searchwrap{ position:relative; }
  #search{
    width:100%; padding: 14px 42px 14px 40px;
    background: var(--card); border:1px solid var(--line); border-radius: 12px;
    color: var(--text); font-size:17px; outline:none;
  }
  #search::placeholder{ color: var(--dim); }
  #search:focus{ border-color: var(--accent-class); }
  .searchwrap svg.icon{
    position:absolute; left:13px; top:50%; transform:translateY(-50%);
    width:18px; height:18px; stroke: var(--dim); pointer-events:none;
  }
  #clearbtn{
    position:absolute; right:9px; top:50%; transform:translateY(-50%);
    width:26px; height:26px; border-radius:50%; border:none;
    background: var(--bg2); color: var(--dim); font-size:14px; line-height:1;
    display:none; align-items:center; justify-content:center;
  }
  #clearbtn.show{ display:flex; }

  .filters{
    display:flex; gap:8px; margin-top:12px; overflow-x:auto;
    padding-bottom:2px; -ms-overflow-style:none; scrollbar-width:none;
  }
  .filters::-webkit-scrollbar{ display:none; }
  .chip{
    flex: 0 0 auto;
    font-size:14px; padding:9px 15px; border-radius:10px;
    border:1px solid var(--line); background: var(--card); color: var(--dim);
    white-space:nowrap; user-select:none; font-weight:500;
  }
  .chip.active{ color:#fff; border-color: transparent; font-weight:700;}
  .chip[data-cat="all"].active{ background:#5b5448; }
  .chip[data-cat="classification"].active{ background: var(--accent-class); }
  .chip[data-cat="clustering"].active{ background: var(--accent-clust); }
  .chip[data-cat="association"].active{ background: var(--accent-assoc); }
  .chip[data-cat="ensembles"].active{ background: var(--accent-ens); }

  .counthint{
    font-size:13px; color:var(--dim); margin-top:10px;
  }

  /* ---------- LIST / TOC ---------- */
  main{ padding: 16px 14px 90px; max-width: 720px; margin:0 auto; }

  .group-label{
    font-size:13px; letter-spacing:0.06em; text-transform:uppercase;
    color: var(--dim); margin: 26px 4px 10px; font-weight:700;
  }
  .group-label:first-of-type{ margin-top:12px; }

  .card{
    background: var(--card); border:1px solid var(--line); border-radius:14px;
    margin-bottom:12px; overflow:hidden;
  }
  .card-head{
    display:flex; align-items:center; gap:12px; padding:16px 16px;
    cursor:pointer; user-select:none;
  }
  .dot{ width:10px; height:10px; border-radius:50%; flex:0 0 auto; }
  .dot.classification{ background: var(--accent-class); }
  .dot.clustering{ background: var(--accent-clust); }
  .dot.association{ background: var(--accent-assoc); }
  .dot.ensembles{ background: var(--accent-ens); }

  .card-title{ flex:1; font-size:18px; font-weight:650; }
  .card-title .sub{ display:block; font-size:13.5px; color:var(--dim); font-weight:500; margin-top:2px;}
  .chev{ color: var(--dim); transition: transform 0.18s ease; flex:0 0 auto; }
  .card.open .chev{ transform: rotate(90deg); }

  .card-body{
    max-height:0; overflow:hidden; transition: max-height 0.25s ease;
  }
  .card.open .card-body{ max-height: 4000px; }
  .card-inner{ padding: 2px 16px 18px; }

  .sec{ margin-top:14px; }
  .sec:first-child{ margin-top:0; }
  .sec h4{
    font-size:12.5px; text-transform:uppercase; letter-spacing:0.05em;
    color: var(--dim); margin:0 0 7px; font-weight:700;
  }
  .sec p, .sec li{ font-size:16px; line-height:1.55; margin:0 0 7px; color: var(--text); }
  .sec ul{ margin:0; padding-left:20px; }
  .sec.good h4{ color: #5d8f63; }
  .sec.bad h4{ color: #b06a5a; }
  .sec.pro h4{ color: #5d8f63; }
  .sec.con h4{ color: #b06a5a; }

  code, .formula{
    font-family:"SF Mono", Menlo, Consolas, monospace;
    background: var(--code-bg); color: var(--mono);
    padding: 2px 6px; border-radius:6px; font-size:14.5px;
  }
  .formula-block{
    font-family:"SF Mono", Menlo, Consolas, monospace;
    background: var(--code-bg); color: var(--mono);
    padding:12px 14px; border-radius:10px; font-size:15px;
    border:1px solid var(--line); margin:8px 0 12px; line-height:1.65;
    overflow-x:auto;
  }
  .complexity-row{
    display:flex; justify-content:space-between; gap:10px;
    font-size:15px; padding:8px 0; border-bottom:1px solid var(--line);
  }
  .complexity-row:last-child{ border-bottom:none; }
  .complexity-row b{ color: var(--mono); font-family:"SF Mono",monospace; font-weight:600;}

  mark{ background: #d9e8f0; color: var(--text); border-radius:3px; padding:0 1px;}

  .empty{
    text-align:center; color: var(--dim); padding: 70px 20px; font-size:16px;
  }
  .empty .big{ font-size:36px; display:block; margin-bottom:12px;}

  /* ---------- footer hint bar ---------- */
  .topbtn{
    position: fixed; right:18px; bottom:20px; z-index:30;
    width:46px; height:46px; border-radius:50%;
    background: var(--card); border:1px solid var(--line); color: var(--text);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition: opacity 0.2s ease;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  }
  .topbtn.show{ opacity:1; pointer-events:auto; }

  @media (min-width:640px){
    .card-title{ font-size:19px; }
  }
</style>
</head>
<body>

<header>
  <div class="titlebar">
    <h1>ΤΕΔΕ <small>αλγόριθμοι εξόρυξης δεδομένων — σκονάκι</small></h1>
    <span class="tag">v1</span>
  </div>

  <div class="searchwrap">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search" type="text" inputmode="search" autocomplete="off" placeholder="αναζήτηση: π.χ. πολυπλοκότητα, entropy, kernel...">
    <button id="clearbtn" aria-label="καθαρισμός">✕</button>
  </div>

  <div class="filters" id="filters">
    <div class="chip active" data-cat="all">Όλα</div>
    <div class="chip" data-cat="classification">Classification</div>
    <div class="chip" data-cat="clustering">Clustering</div>
    <div class="chip" data-cat="association">Association Rules</div>
    <div class="chip" data-cat="ensembles">Ensembles</div>
  </div>
  <div class="counthint" id="counthint"></div>
</header>

<main id="main"></main>

<button class="topbtn" id="topbtn" aria-label="πάνω">↑</button>

<script>
const DATA = [
{
  id:"dtree", cat:"classification", title:"Δένδρα Αποφάσεων", sub:"Decision Trees",
  keywords:"hunt entropy εντροπια κερδος πληροφοριας information gain greedy split διακλαδωση",
  sections: [
    {h:"Περιγραφή", p:["Κατασκευάζουν μοντέλο σε μορφή δέντρου από δεδομένα εκπαίδευσης. Κάθε εσωτερικός κόμβος = συνθήκη ελέγχου σε χαρακτηριστικό, κάθε φύλλο = ετικέτα κατηγορίας.",
      "Η κατηγοριοποίηση ξεκινά από τη ρίζα, ακολουθεί διακλαδώσεις βάσει συνθηκών μέχρι το φύλλο.",
      "Χωρίζει τον χώρο σε (συνήθως ορθογώνιες) περιοχές. Εύρεση βέλτιστου δέντρου = υπολογιστικά δύσκολη (εκθετικά πολλά δέντρα) → χρήση άπληστων (greedy) αλγορίθμων."]},
    {h:"Κέρδος Πληροφορίας", p:["Χρήση μέτρων ανομοιογένειας (π.χ. εντροπία) για επιλογή καλύτερου διαχωρισμού."],
      formula:"Κέρδος Πληροφορίας = Εντροπία(γονέα) − σταθμισμένη Εντροπία(παιδιών)",
      p2:["Επιλέγεται η συνθήκη που μεγιστοποιεί το κέρδος πληροφορίας."]},
    {h:"Πολυπλοκότητα", complexity:[
        ["Κατασκευή (γενικά)","O(M·K·logK)"],
        ["Κατηγοριοποίηση N εγγραφών","O(N·h)"],
        ["...ισορροπημένο δέντρο (h≈logK)","O(N·logK)"],
        ["...χειρότερη περίπτωση (βαθύ)","O(N·K)"]
      ], note:"K = πλήθος δεδομένων εκπαίδευσης, M = πλήθος χαρακτηριστικών, h = ύψος δέντρου, N = πλήθος δειγμάτων ελέγχου."},
    {h:"Hunt — πολυπλοκότητα best split", p:["n παραδείγματα, k γνωρίσματα A1..Ak, το Ai έχει mi διακριτές τιμές → ~mi−1 πιθανά split ανά γνώρισμα."],
      formula:"Συνολικά υποψήφια split = Σ(mi − 1)\nΠολυπλοκότητα = O(n · Σmi)"},
    {h:"Κατάλληλος για", cls:"good", list:["Μεγάλο πλήθος δειγμάτων ελέγχου","Πολυδιάστατα δεδομένα","Κατηγορικά χαρακτηριστικά","Συνεχή αριθμητικά δεδομένα (με διακριτοποίηση/κατάλληλα splits)"]},
    {h:"Ακατάλληλος για", cls:"bad", list:["Πολλά ελλιπή δεδομένα","Δεδομένα που αλλάζουν συχνά (απαιτείται συχνή ανακατασκευή)"]},
    {h:"Αλγόριθμος Hunt", p:["Κατασκευάζει το δέντρο αναδρομικά, διαχωρίζοντας κάθε φορά τα δεδομένα ενός κόμβου βάσει χαρακτηριστικού.",
      "Σταματά όταν: όλες οι εγγραφές κόμβου ίδια κατηγορία, ή κριτήριο τερματισμού.",
      "Σε συνεχή δεδομένα → διακριτοποίηση (ομαδοποίηση τιμών σε διαστήματα). Η επιλογή διαστημάτων/μεθόδου επηρεάζει απόδοση & έχει επιπλέον κόστος."]}
  ]
},
{
  id:"knn", cat:"classification", title:"Πλησιέστερου Γείτονα", sub:"k-Nearest Neighbors (k-NN)",
  keywords:"lazy learning αποσταση ομοιοτητα majority vote ισοψηφια kd-tree",
  sections:[
    {h:"Περιγραφή", p:["Lazy learning: δεν κατασκευάζει μοντέλο στην εκπαίδευση — αποθηκεύει τα δεδομένα και υπολογίζει κατά την κατηγοριοποίηση.",
      "Κάθε δείγμα = σημείο σε χώρο d διαστάσεων (d = πλήθος χαρακτηριστικών). Βρίσκει k πλησιέστερους γείτονες βάσει απόστασης/ομοιότητας.",
      "Κατηγορία = πλειοψηφία των k γειτόνων. Σε ισοψηφία: κανόνας επίλυσης (π.χ. πιο κοντινός γείτονας ή τυχαία επιλογή)."]},
    {h:"Επιλογή k", p:["Μικρό k → ευαίσθητο σε θόρυβο. Μεγάλο k → λαμβάνει υπόψη μακρινά σημεία.",
      "Σε προβλήματα 2 κατηγοριών: προτιμάται περιττό k (αποφυγή ισοψηφίας).",
      "Είσοδοι αλγορίθμου: σύνολο εκπαίδευσης, μετρική απόστασης/ομοιότητας, τιμή k."]},
    {h:"Πολυπλοκότητα", complexity:[
        ["Χρόνος","O(N·M·d)"],
        ["Χώρος","O(M·d)"]
      ], note:"M = δεδομένα εκπαίδευσης, N = δείγματα ελέγχου, d = χαρακτηριστικά. Κάθε test σύγκριση με κάθε train, κόστος d ανά σύγκριση."},
    {h:"Βελτιώσεις", list:["Δομές ευρετηρίασης (KD-tree) — κυρίως σε μικρές διαστάσεις","Παράλληλη εκτέλεση","Early abandonment (πρόωρη διακοπή υπολογισμού απόστασης)","Μείωση μεγέθους συνόλου εκπαίδευσης"]},
    {h:"Κατάλληλος για", cls:"good", list:["Δεδομένα μικρών διαστάσεων","Συνεχή αριθμητικά δεδομένα","Δεδομένα που αλλάζουν συχνά (δεν χρειάζεται επανεκπαίδευση)","Ελλιπή δεδομένα (με κατάλληλο χειρισμό)"]},
    {h:"Ακατάλληλος για", cls:"bad", list:["Πολύ μεγάλο πλήθος δεδομένων εκπαίδευσης/ελέγχου (πολλοί υπολογισμοί)","Πολυδιάστατα δεδομένα (η απόσταση χάνει νόημα)","Κατηγορικά χαρακτηριστικά χωρίς κατάλληλη μετρική/μετατροπή"]}
  ]
},
{
  id:"nbayes", cat:"classification", title:"Naive Bayes", sub:"πιθανολογικός κατηγοριοποιητής",
  keywords:"bayes θεωρημα πιθανοτητα ανεξαρτησια prior posterior",
  sections:[
    {h:"Περιγραφή", p:["Πιθανολογικός κατηγοριοποιητής βάσει θεωρήματος Bayes: υπολογίζει P(κατηγορία) για κάθε δείγμα και επιλέγει την πιο πιθανή.",
      "«Naive»: απλοποιητική υπόθεση ότι τα χαρακτηριστικά είναι υπό συνθήκη ανεξάρτητα, δεδομένης της κατηγορίας."]},
    {h:"Θεώρημα Bayes", formula:"P(Y / X) = P(X / Y) · P(Y) / P(X)",
      p:["P(Y): εκ των προτέρων πιθανότητα κατηγορίας — εκτιμάται από ποσοστό δειγμάτων εκπαίδευσης στην κατηγορία.",
         "Με την υπόθεση ανεξαρτησίας:"],
      formula2:"P(X / Y) = Π P(Xi / Y)",
      p2:["Άρα επιλέγεται η κατηγορία που μεγιστοποιεί:"],
      formula3:"P(Y) · Π P(Xi / Y)",
      p3:["Το P(X) αγνοείται — είναι ίδιο για όλες τις κατηγορίες."]},
    {h:"Κατάλληλος για", cls:"good", list:["Πολυδιάστατα δεδομένα","Κατηγορικά χαρακτηριστικά"]},
    {h:"Ακατάλληλος για / προσοχή", cls:"bad", list:["Συνεχή αριθμητικά δεδομένα — χρειάζεται κατάλληλος χειρισμός (π.χ. διακριτοποίηση)"]},
    {h:"Πλεονεκτήματα", cls:"pro", list:["Απλοποιημένοι υπολογισμοί λόγω ανεξαρτησίας — δεν χρειάζεται πολύ μεγάλο training set","Απλός, γρήγορος, εφαρμόζεται σε μεγάλο πλήθος δεδομένων ελέγχου","Χειρίζεται ελλιπείς τιμές (αγνοεί τις αντίστοιχες πιθανότητες)"]},
    {h:"Επιπλέον", p:["Σε συνεχή δεδομένα → διακριτοποίηση (ομαδοποίηση σε διαστήματα). Πλήθος διαστημάτων & μέθοδος επηρεάζουν απόδοση, με επιπλέον κόστος."]}
  ]
},
{
  id:"svm", cat:"classification", title:"SVM", sub:"Support Vector Machine",
  keywords:"υπερεπιπεδο περιθωριο margin support vectors kernel trick slack variables",
  sections:[
    {h:"Περιγραφή", p:["Βρίσκει υπερεπίπεδο απόφασης που διαχωρίζει τις κατηγορίες, επιλέγοντας αυτό που μεγιστοποιεί το περιθώριο (απόσταση από κοντινότερα σημεία).",
      "Τα κοντινότερα σημεία = support vectors — καθορίζουν το όριο απόφασης.",
      "Μη γραμμικά διαχωρίσιμα δεδομένα → slack variables (επιτρέπονται λάθη).",
      "Μη γραμμικά προβλήματα → kernel trick (έμμεση μετάβαση σε χώρο μεγαλύτερων διαστάσεων)."]},
    {h:"Πλεονεκτήματα", cls:"pro", list:["Καλή γενίκευση (μεγιστοποίηση περιθωρίου)","Χειρίζεται μη γραμμικά προβλήματα με kernel","Κυρτή βελτιστοποίηση → ολικό βέλτιστο, όχι τοπικό ελάχιστο"]},
    {h:"Μειονεκτήματα", cls:"con", list:["Υψηλό υπολογιστικό κόστος εκπαίδευσης","Χρειάζεται επιλογή κατάλληλου kernel & παραμέτρου κόστους","Δυσκολία με ελλιπείς τιμές/κατηγορικά χαρακτηριστικά χωρίς προεπεξεργασία"]}
  ]
},
{
  id:"fisher", cat:"classification", title:"Fisher", sub:"γραμμική μέθοδος διαχωρισμού",
  keywords:"προβολη διασπορα μεσοι οροι linear discriminant",
  sections:[
    {h:"Περιγραφή", p:["Γραμμική μέθοδος που βρίσκει προβολή των δεδομένων όπου οι κατηγορίες διαχωρίζονται όσο γίνεται καλύτερα.",
      "Στόχος: μέσοι όροι κατηγοριών όσο πιο απομακρυσμένοι, σημεία ίδιας κατηγορίας όσο πιο κοντά μεταξύ τους.",
      "Δηλαδή: μεγιστοποίηση διαφοράς μεταξύ κατηγοριών + ελαχιστοποίηση διασποράς εντός κατηγορίας."]},
    {h:"Fisher vs SVM", list:["Fisher: προβολή βάσει μέσων όρων & διασποράς.","SVM: όριο απόφασης βάσει μεγιστοποίησης περιθωρίου & support vectors.","Το SVM είναι πιο ευέλικτο — με kernels χειρίζεται και μη γραμμικά προβλήματα."]}
  ]
},
{
  id:"nn", cat:"classification", title:"Neural Networks", sub:"Νευρωνικά Δίκτυα",
  keywords:"perceptron backpropagation gradient descent κρυφο επιπεδο overfitting",
  sections:[
    {h:"Περιγραφή", p:["Μαθαίνουν σύνθετες μη γραμμικές συναρτήσεις, συνδυάζοντας απλές μονάδες επεξεργασίας (κόμβοι + κατευθυνόμενες ακμές με βάρη)."]},
    {h:"Perceptron", p:["Απλούστερο νευρωνικό δίκτυο — ένας νευρώνας. Μαθαίνει γραμμικά όρια απόφασης· δεν λύνει μη γραμμικώς διαχωρίσιμα προβλήματα."]},
    {h:"Πολυεπίπεδα Δίκτυα", p:["Επίπεδο εισόδου, ένα+ κρυφά επίπεδα, επίπεδο εξόδου. Τα κρυφά επίπεδα λειτουργούν σαν εξαγωγή χαρακτηριστικών.",
      "Με τουλάχιστον 1 κρυφό επίπεδο → μπορούν να μάθουν μη γραμμικά όρια απόφασης."]},

const CAT_LABEL = { classification:"Classification", clustering:"Clustering", association:"Association Rules", ensembles:"Ensembles" };
const CAT_ORDER = ["classification","clustering","association","ensembles"];

const mainEl = document.getElementById('main');
const searchEl = document.getElementById('search');
const clearBtn = document.getElementById('clearbtn');
const counthint = document.getElementById('counthint');
const filters = document.getElementById('filters');
let activeCat = "all";

function escapeHtml(s){
  return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}

function highlight(text, q){
  if(!q) return escapeHtml(text);
  const esc = escapeHtml(text);
  const qEsc = escapeHtml(q);
  try{
    const re = new RegExp('('+qEsc.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
    return esc.replace(re, '<mark>$1</mark>');
  }catch(e){ return esc; }
}

function cardMatches(card, q){
  if(!q) return true;
  const hay = (card.title+' '+card.sub+' '+card.keywords+' '+JSON.stringify(card.sections)).toLowerCase();
  return hay.includes(q.toLowerCase());
}

function renderSection(sec, q){
  let html = '<div class="sec'+(sec.cls?(' '+sec.cls):'')+'">';
  html += '<h4>'+highlight(sec.h, q)+'</h4>';
  if(sec.p){ sec.p.forEach(t=> html += '<p>'+highlight(t,q)+'</p>'); }
  if(sec.formula){ html += '<div class="formula-block">'+escapeHtml(sec.formula)+'</div>'; }
  if(sec.p2){ sec.p2.forEach(t=> html += '<p>'+highlight(t,q)+'</p>'); }
  if(sec.formula2){ html += '<div class="formula-block">'+escapeHtml(sec.formula2)+'</div>'; }
  if(sec.p3){ sec.p3.forEach(t=> html += '<p>'+highlight(t,q)+'</p>'); }
  if(sec.formula3){ html += '<div class="formula-block">'+escapeHtml(sec.formula3)+'</div>'; }
  if(sec.complexity){
    html += '<div>';
    sec.complexity.forEach(row=>{
      html += '<div class="complexity-row"><span>'+highlight(row[0],q)+'</span><b>'+escapeHtml(row[1])+'</b></div>';
    });
    html += '</div>';
    if(sec.note) html += '<p style="margin-top:9px;color:var(--dim);font-size:14px;">'+highlight(sec.note,q)+'</p>';
  }
  if(sec.list){
    html += '<ul>';
    sec.list.forEach(li=> html += '<li>'+highlight(li,q)+'</li>');
    html += '</ul>';
  }
  html += '</div>';
  return html;
}

function render(){
  const q = searchEl.value.trim();
  clearBtn.classList.toggle('show', q.length>0);

  let visible = DATA.filter(c => (activeCat==="all" || c.cat===activeCat) && cardMatches(c,q));

  if(visible.length===0){
    mainEl.innerHTML = '<div class="empty"><span class="big">∅</span>Δεν βρέθηκε τίποτα.<br>Δοκίμασε άλλον όρο αναζήτησης.</div>';
    counthint.textContent = '';
    return;
  }

  counthint.textContent = visible.length + ' / ' + DATA.length + ' ενότητες';

  // group by category, in fixed order, but only show groups that have visible items
  let html = '';
  const catsToShow = activeCat==="all" ? CAT_ORDER : [activeCat];
  catsToShow.forEach(cat=>{
    const items = visible.filter(c=>c.cat===cat);
    if(items.length===0) return;
    html += '<div class="group-label">'+CAT_LABEL[cat]+'</div>';
    items.forEach(card=>{
      const openClass = q ? ' open' : '';
      html += '<div class="card'+openClass+'" data-id="'+card.id+'">';
      html += '<div class="card-head">';
      html += '<span class="dot '+card.cat+'"></span>';
      html += '<span class="card-title">'+highlight(card.title,q)+'<span class="sub">'+highlight(card.sub,q)+'</span></span>';
      html += '<svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>';
      html += '</div>';
      html += '<div class="card-body"><div class="card-inner">';
      card.sections.forEach(sec=> html += renderSection(sec,q));
      html += '</div></div>';
      html += '</div>';
    });
  });

  mainEl.innerHTML = html;

  // attach toggle handlers
  mainEl.querySelectorAll('.card-head').forEach(head=>{
    head.addEventListener('click', ()=>{
      head.parentElement.classList.toggle('open');
    });
  });
}

searchEl.addEventListener('input', render);
clearBtn.addEventListener('click', ()=>{
  searchEl.value=''; render(); searchEl.focus();
});

filters.addEventListener('click', (e)=>{
  const chip = e.target.closest('.chip');
  if(!chip) return;
  filters.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  activeCat = chip.dataset.cat;
  render();
});

// scroll to top button
const topbtn = document.getElementById('topbtn');
window.addEventListener('scroll', ()=>{
  topbtn.classList.toggle('show', window.scrollY > 400);
});
topbtn.addEventListener('click', ()=> window.scrollTo({top:0, behavior:'smooth'}));

render();
</script>
